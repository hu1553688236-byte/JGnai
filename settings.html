<div class="nai-gen-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b class="nai-header-title">🎨 NAI ImageGen</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="nai_block flex-container flexGap5 alignItemsCenter">
                <input id="nai_enabled" type="checkbox" />
                <label for="nai_enabled" class="checkbox-label">启用 NovelAI 生图</label>
            </div>

            <hr class="sysHR" />

            <div class="nai-section">
                <h4 class="nai-section-title">服务器连接</h4>

                <label for="nai_base_url">代理服务器地址</label>
                <input id="nai_base_url" type="text" class="text_pole wide100p"
                       placeholder="https://your-app.zeabur.app" />

                <label for="nai_token" style="margin-top: 10px;">Token</label>
                <div class="nai_block flex-container flexGap5">
                    <input id="nai_token" type="password" class="text_pole"
                           placeholder="你的专属 Token" style="flex: 1;" />
                    <button id="nai_toggle_key" type="button" class="menu_button menu_button_icon" title="显示/隐藏">
                        👁️
                    </button>
                </div>

                <div class="nai_block flex-container flexGap5 alignItemsCenter" style="margin-top: 8px;">
                    <input id="nai_verify_btn" type="button" class="menu_button" value="测试连接" />
                    <span id="nai_login_status" class="nai-status">未连接</span>
                </div>
                <div id="nai_quota_info" class="nai-hint" style="margin-top:5px;"></div>
            </div>

            <hr class="sysHR" />

            <div class="nai-section">
                <h4 class="nai-section-title">生成设置</h4>

                <label for="nai_model">模型</label>
                <select id="nai_model" class="text_pole wide100p">
                    <optgroup label="── V4.5 ──">
                        <option value="nai-diffusion-4-5-curated" selected>V4.5 Curated (推荐)</option>
                        <option value="nai-diffusion-4-5-full">V4.5 Full</option>
                    </optgroup>
                    <optgroup label="── V4 ──">
                        <option value="nai-diffusion-4-curated-preview">V4 Curated</option>
                        <option value="nai-diffusion-4-full">V4 Full</option>
                    </optgroup>
                    <optgroup label="── V3 ──">
                        <option value="nai-diffusion-3">V3 Anime</option>
                        <option value="nai-diffusion-furry-3">V3 Furry</option>
                    </optgroup>
                </select>

                <div class="nai_block flex-container flexGap5" style="margin-top:10px;">
                    <div style="flex:1;">
                        <label for="nai_width">宽度</label>
                        <input id="nai_width" type="number" class="text_pole wide100p" value="832" step="64" />
                    </div>
                    <div style="flex:1;">
                        <label for="nai_height">高度</label>
                        <input id="nai_height" type="number" class="text_pole wide100p" value="1216" step="64" />
                    </div>
                </div>

                <label for="nai_size_preset" style="margin-top:8px;">尺寸预设</label>
                <select id="nai_size_preset" class="text_pole wide100p">
                    <option value="832,1216">竖版 832×1216</option>
                    <option value="1216,832">横版 1216×832</option>
                    <option value="1024,1024">正方 1024×1024</option>
                    <option value="1536,1024">宽屏 1536×1024</option>
                    <option value="custom">自定义</option>
                </select>

                <label for="nai_sampler" style="margin-top:10px;">采样器</label>
                <select id="nai_sampler" class="text_pole wide100p">
                    <option value="k_euler">Euler</option>
                    <option value="k_euler_ancestral" selected>Euler A (V4.5推荐)</option>
                    <option value="k_dpmpp_2s_ancestral">DPM++ 2S A</option>
                    <option value="k_dpmpp_2m_sde">DPM++ 2M SDE</option>
                    <option value="k_dpmpp_sde">DPM++ SDE</option>
                </select>

                <label for="nai_steps" style="margin-top:10px;">步数: <span id="nai_steps_val">28</span></label>
                <input id="nai_steps" type="range" min="1" max="50" value="28" class="wide100p" />

                <label for="nai_cfg" style="margin-top:8px;">CFG: <span id="nai_cfg_val">3.0</span></label>
                <input id="nai_cfg" type="range" min="1" max="20" value="3" step="0.5" class="wide100p" />
            </div>

            <hr class="sysHR" />

            <div class="nai-section">
                <h4 class="nai-section-title">标记格式</h4>
                <div class="nai_block flex-container flexGap5">
                    <div style="flex:1;">
                        <label for="nai_start_marker">开始标记</label>
                        <input id="nai_start_marker" type="text" class="text_pole wide100p" value="image###" />
                    </div>
                    <div style="flex:1;">
                        <label for="nai_end_marker">结束标记</label>
                        <input id="nai_end_marker" type="text" class="text_pole wide100p" value="###" />
                    </div>
                </div>
                <div class="nai-hint">示例: <code>image###1girl, beautiful###</code></div>
            </div>

            <hr class="sysHR" />

            <div class="nai-section">
                <h4 class="nai-section-title">全局提示词</h4>
                <label for="nai_global_positive">正向 (自动添加到开头)</label>
                <textarea id="nai_global_positive" class="text_pole wide100p" rows="2"
                          placeholder="masterpiece, best quality, "></textarea>
                <label for="nai_global_negative" style="margin-top:8px;">反向</label>
                <textarea id="nai_global_negative" class="text_pole wide100p" rows="2"
                          placeholder="">blurry, lowres, bad anatomy, worst quality, bad quality, jpeg artifacts</textarea>
            </div>

        </div>
    </div>
</div>
